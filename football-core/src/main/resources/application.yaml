spring:
  application:
    name: football-core
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/football_app}
    username: ${DB_USERNAME:football_user}
    password: ${DB_PASSWORD:football_password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

logging:
  level:
    org.flywaydb: info

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}
    app-url: ${TELEGRAM_APP_URL:}

app:
  time-zone: ${APP_TIME_ZONE:Asia/Almaty}
  contribution-reminders:
    fixed-delay-ms: ${CONTRIBUTION_REMINDER_FIXED_DELAY_MS:1800000}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*}
  uploads:
    venue-photos-dir: ${VENUE_PHOTOS_DIR:uploads/session-venues}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
